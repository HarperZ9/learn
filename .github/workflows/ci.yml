name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run the full test suite (zero external dependencies)
        run: node --test
      - name: Doctor self-check (integrity invariants must report MATCH)
        run: node src/cli.mjs doctor
      - name: Status envelope smoke check
        run: node src/cli.mjs status
